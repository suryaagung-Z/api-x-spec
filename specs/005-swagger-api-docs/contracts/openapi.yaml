                  created_at: "2026-01-15T09:00:00Z"
        "401":
          description: "Token tidak ada, tidak valid, atau sudah kedaluwarsa."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "UNAUTHORIZED"
                  message: "Could not validate credentials."
