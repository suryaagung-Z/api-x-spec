  # ================================================================ Registrations
  /registrations/{event_id}:
    post:
      tags: [registrations]
      summary: "Daftar ke sebuah event"
      description: |
        Mendaftarkan pengguna yang sedang login ke event yang ditentukan.

        **Akses**: Memerlukan token — sertakan JWT di header `Authorization: Bearer <token>`.

        **Aturan**:
        - Pengguna tidak boleh mendaftar ke event yang sudah mereka daftarkan (dan pendaftaran masih aktif).
        - Kuota event tidak boleh sudah penuh.
        - Batas waktu pendaftaran event belum boleh lewat.
      security:
        - BearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          description: "ID event yang ingin didaftarkan."
          schema:
            type: integer
            minimum: 1
          examples:
            valid:
              value: 42
      responses:
        "201":
          description: "Pendaftaran berhasil."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationResponse"
              example:
                id: 101
                event_id: 42
                status: "active"
                registered_at: "2026-03-09T10:30:00"
        "401":
          description: "Token tidak ada, tidak valid, atau sudah kedaluwarsa."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "UNAUTHORIZED"
                  message: "Could not validate credentials."
                  httpStatus: 401
        "404":
          description: "Event tidak ditemukan."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "EVENT_NOT_FOUND"
                  message: "Event not found."
                  httpStatus: 404
        "409":
          description: "Pendaftaran gagal karena salah satu kondisi: sudah terdaftar, kuota penuh, atau batas waktu lewat."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                duplicate:
                  summary: "Sudah terdaftar ke event ini"
                  value:
                    error:
                      code: "DUPLICATE_REGISTRATION"
                      message: "You already have an active registration for this event."
                      httpStatus: 409
                quota_full:
                  summary: "Kuota event sudah penuh"
                  value:
                    error:
                      code: "QUOTA_FULL"
                      message: "Event quota is full."
                      httpStatus: 409
                deadline_passed:
                  summary: "Batas waktu pendaftaran sudah lewat"
                  value:
                    error:
                      code: "REGISTRATION_DEADLINE_PASSED"
                      message: "Registration deadline has passed."
                      httpStatus: 409

    delete:
      tags: [registrations]
      summary: "Batalkan pendaftaran dari sebuah event"
      description: |
        Membatalkan pendaftaran aktif pengguna yang sedang login dari event yang ditentukan.

        **Akses**: Memerlukan token — sertakan JWT di header `Authorization: Bearer <token>`.

        Mengembalikan **204 No Content** jika berhasil (tidak ada body respons).
      security:
        - BearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          description: "ID event yang ingin dibatalkan pendaftarannya."
          schema:
            type: integer
            minimum: 1
          examples:
            valid:
              value: 42
      responses:
        "204":
          description: "Pendaftaran berhasil dibatalkan. Tidak ada body respons."
        "401":
          description: "Token tidak ada, tidak valid, atau sudah kedaluwarsa."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "UNAUTHORIZED"
                  message: "Could not validate credentials."
                  httpStatus: 401
        "404":
          description: "Tidak ada pendaftaran aktif yang dapat dibatalkan untuk event ini."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "NO_ACTIVE_REGISTRATION"
                  message: "No active registration found for this event."
                  httpStatus: 404

  /registrations/me:
    get:
      tags: [registrations]
      summary: "Lihat daftar event yang sudah didaftarkan"
      description: |
        Mengembalikan semua pendaftaran milik pengguna yang sedang login, beserta
        ringkasan informasi setiap event yang didaftarkan.

        **Akses**: Memerlukan token — sertakan JWT di header `Authorization: Bearer <token>`.

        Mengembalikan semua pendaftaran termasuk yang sudah dibatalkan (status `cancelled`).
      security:
        - BearerAuth: []
      responses:
        "200":
          description: "Daftar pendaftaran berhasil diambil."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RegistrationWithEventResponse"
              example:
                - id: 101
                  event_id: 42
                  status: "active"
                  registered_at: "2026-03-09T10:30:00"
                  cancelled_at: null
                  event:
                    id: 42
                    title: "Workshop Python Lanjutan"
                    date: "2026-06-15T09:00:00"
                    registration_deadline: "2026-06-10T23:59:59"
                    status: "active"
        "401":
          description: "Token tidak ada, tidak valid, atau sudah kedaluwarsa."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "UNAUTHORIZED"
                  message: "Could not validate credentials."
                  httpStatus: 401

  # ================================================================ Admin Reports
  /admin/reports/events/stats:
    get:
      tags: [Admin Reporting]
      summary: "Statistik peserta per event aktif (khusus admin)"
      description: |
        Mengembalikan daftar event aktif beserta statistik jumlah peserta terdaftar
        dan sisa kuota untuk setiap event, secara terpaginasi.

        **Akses**: Khusus admin — memerlukan JWT token dengan role `admin`.

        **Definisi "event aktif"**: Event dengan status `active` DAN tanggal pelaksanaan
        belum lewat saat query dijalankan.

        **`total_registered`**: Hanya menghitung pendaftaran dengan status `active`;
        pendaftaran yang dibatalkan tidak dihitung.

        **`remaining_quota`**: `quota − total_registered`. Dapat bernilai negatif
        jika ada anomali data — tidak di-clamp ke nol agar admin dapat mendeteksinya.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: "Nomor halaman yang diminta (dimulai dari 1)."
          schema:
            type: integer
            minimum: 1
            default: 1
          examples:
            first_page:
              value: 1
        - name: page_size
          in: query
          required: false
          description: "Jumlah event per halaman (minimal 1, maksimal 100)."
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          examples:
            default_size:
              value: 20
      responses:
        "200":
          description: "Statistik peserta berhasil diambil."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventStatsPage"
              example:
                items:
                  - id: 42
                    title: "Workshop Python Lanjutan"
                    date: "2026-06-15T09:00:00"
                    quota: 50
                    total_registered: 37
                    remaining_quota: 13
                  - id: 43
                    title: "Seminar Cloud Architecture"
                    date: "2026-07-01T13:00:00"
                    quota: 100
                    total_registered: 100
                    remaining_quota: 0
                total: 120
                page: 1
                size: 20
                pages: 6
        "401":
          description: "Token tidak ada, tidak valid, atau sudah kedaluwarsa."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "UNAUTHORIZED"
                  message: "Could not validate credentials."
                  httpStatus: 401
        "403":
          description: "Token valid tapi bukan role admin."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "FORBIDDEN"
                  message: "You do not have permission to perform this action."
                  httpStatus: 403

