  # ================================================================ Public Events
  /events:
    get:
      tags: [events]
      summary: "Daftar event yang tersedia"
      description: |
        Mengembalikan daftar event yang berstatus `active` secara terpaginasi.

        **Akses**: Publik — tidak memerlukan autentikasi.

        Hasil diurutkan berdasarkan tanggal terdekat. Event dengan status `deleted` tidak ditampilkan.
      parameters:
        - name: page
          in: query
          required: false
          description: "Nomor halaman yang diminta (dimulai dari 1)."
          schema:
            type: integer
            minimum: 1
            default: 1
          examples:
            first_page:
              summary: "Halaman pertama"
              value: 1
        - name: page_size
          in: query
          required: false
          description: "Jumlah event per halaman (minimal 1, maksimal 100)."
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          examples:
            default_size:
              summary: "20 per halaman (default)"
              value: 20
      responses:
        "200":
          description: "Daftar event berhasil diambil."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page_EventResponse"
              example:
                items:
                  - id: 42
                    title: "Workshop Python Lanjutan"
                    description: "Workshop intensif satu hari tentang FastAPI dan Pydantic v2."
                    date: "2026-06-15T09:00:00"
                    registration_deadline: "2026-06-10T23:59:59"
                    quota: 50
                    status: "active"
                    created_at: "2026-03-09T08:00:00"
                    registration_closed: false
                total_items: 85
                page: 1
                page_size: 20
                total_pages: 5
        "422":
          description: "Parameter tidak valid (misalnya `page` kurang dari 1 atau `page_size` lebih dari 100)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "VALIDATION_ERROR"
                  message: "Input should be greater than or equal to 1"
                  httpStatus: 422

  /events/{event_id}:
    get:
      tags: [events]
