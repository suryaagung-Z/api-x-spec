                  httpStatus: 403

  # ================================================================ Admin Events
  /admin/events:
    post:
      tags: [admin-events]
      summary: "Buat event baru (khusus admin)"
      description: |
        Membuat event baru dengan informasi judul, deskripsi, tanggal, batas pendaftaran, dan kuota.

        **Akses**: Khusus admin — memerlukan JWT token dengan role `admin`.

        **Aturan**:
        - `registration_deadline` harus sebelum atau sama dengan `date`.
        - `quota` minimal 1.
        - Event yang baru dibuat langsung berstatus `active`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventCreate"
            example:
              title: "Workshop Python Lanjutan"
              description: "Workshop intensif satu hari tentang FastAPI dan Pydantic v2."
              date: "2026-06-15T09:00:00+07:00"
              registration_deadline: "2026-06-10T23:59:59+07:00"
              quota: 50
      responses:
        "201":
          description: "Event berhasil dibuat."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
              example:
                id: 42
                title: "Workshop Python Lanjutan"
                description: "Workshop intensif satu hari tentang FastAPI dan Pydantic v2."
                date: "2026-06-15T09:00:00"
                registration_deadline: "2026-06-10T23:59:59"
                quota: 50
                status: "active"
                created_at: "2026-03-09T08:00:00"
                registration_closed: false
        "401":
          description: "Token tidak ada, tidak valid, atau sudah kedaluwarsa."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "UNAUTHORIZED"
                  message: "Could not validate credentials."
                  httpStatus: 401
        "403":
          description: "Token valid tapi bukan role admin."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "FORBIDDEN"
                  message: "You do not have permission to perform this action."
                  httpStatus: 403
        "422":
          description: "Data tidak valid — misalnya `registration_deadline` setelah `date`, atau `quota` kurang dari 1."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalid_date_range:
                  summary: "registration_deadline setelah date"
                  value:
                    error:
                      code: "INVALID_DATE_RANGE"
                      message: "registration_deadline must be on or before the event date"
                      httpStatus: 422
                validation_error:
                  summary: "Field tidak valid"
                  value:
                    error:
                      code: "VALIDATION_ERROR"
                      message: "Input should be greater than or equal to 1"
                      httpStatus: 422

  /admin/events/{event_id}:
    get:
      tags: [admin-events]
      summary: "Ambil detail event (khusus admin)"
      description: |
        Mengembalikan detail lengkap satu event berdasarkan ID, termasuk event yang sudah dihapus.

        **Akses**: Khusus admin — memerlukan JWT token dengan role `admin`.

        Berbeda dengan `GET /events/{event_id}` (publik) yang hanya mengembalikan event aktif.
      security:
        - BearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          description: "ID unik event yang ingin dilihat detailnya."
          schema:
            type: integer
            minimum: 1
          examples:
            valid:
              value: 42
      responses:
        "200":
          description: "Detail event berhasil diambil."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
              example:
                id: 42
                title: "Workshop Python Lanjutan"
                description: "Workshop intensif satu hari tentang FastAPI dan Pydantic v2."
                date: "2026-06-15T09:00:00"
                registration_deadline: "2026-06-10T23:59:59"
                quota: 50
                status: "active"
                created_at: "2026-03-09T08:00:00"
                registration_closed: false
        "401":
          description: "Token tidak ada, tidak valid, atau sudah kedaluwarsa."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "UNAUTHORIZED"
                  message: "Could not validate credentials."
                  httpStatus: 401
        "403":
          description: "Token valid tapi bukan role admin."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "FORBIDDEN"
                  message: "You do not have permission to perform this action."
                  httpStatus: 403
        "404":
          description: "Event dengan ID tersebut tidak ditemukan."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "EVENT_NOT_FOUND"
                  message: "Event not found."
                  httpStatus: 404

    put:
      tags: [admin-events]
      summary: "Perbarui informasi event (khusus admin)"
      description: |
        Memperbarui satu atau lebih field event yang sudah ada. Hanya field yang disertakan
        dalam request body yang akan diperbarui (partial update).

        **Akses**: Khusus admin — memerlukan JWT token dengan role `admin`.

        **Aturan**:
        - Jika `quota` diperbarui, nilai baru tidak boleh lebih kecil dari jumlah peserta aktif saat ini.
        - Jika `registration_deadline` dan `date` keduanya disertakan, `registration_deadline` harus ≤ `date`.
      security:
        - BearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          description: "ID unik event yang akan diperbarui."
          schema:
            type: integer
            minimum: 1
          examples:
            valid:
              value: 42
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
            example:
              title: "Workshop Python Lanjutan — Edisi Revisi"
              quota: 75
      responses:
        "200":
          description: "Event berhasil diperbarui."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
              example:
                id: 42
                title: "Workshop Python Lanjutan — Edisi Revisi"
                description: "Workshop intensif satu hari tentang FastAPI dan Pydantic v2."
                date: "2026-06-15T09:00:00"
                registration_deadline: "2026-06-10T23:59:59"
                quota: 75
                status: "active"
                created_at: "2026-03-09T08:00:00"
                registration_closed: false
        "401":
          description: "Token tidak ada, tidak valid, atau sudah kedaluwarsa."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "UNAUTHORIZED"
                  message: "Could not validate credentials."
                  httpStatus: 401
        "403":
          description: "Token valid tapi bukan role admin."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "FORBIDDEN"
                  message: "You do not have permission to perform this action."
                  httpStatus: 403
        "404":
          description: "Event dengan ID tersebut tidak ditemukan."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "EVENT_NOT_FOUND"
                  message: "Event not found."
                  httpStatus: 404
        "409":
          description: "Kuota baru lebih kecil dari jumlah peserta aktif."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "QUOTA_BELOW_PARTICIPANTS"
                  message: "New quota is below the current number of active participants."
                  httpStatus: 409
        "422":
          description: "Data tidak valid."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "VALIDATION_ERROR"
                  message: "Input should be greater than or equal to 1"
                  httpStatus: 422

    delete:
      tags: [admin-events]
      summary: "Hapus event (khusus admin)"
      description: |
        Menghapus event secara soft delete — status event diubah menjadi `deleted` dan event
        tidak lagi muncul di endpoint publik, tapi data tetap tersimpan di database.

        **Akses**: Khusus admin — memerlukan JWT token dengan role `admin`.

        Mengembalikan **204 No Content** jika berhasil (tidak ada body respons).
      security:
        - BearerAuth: []
      parameters:
        - name: event_id
          in: path
