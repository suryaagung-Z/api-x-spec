          description: "ID unik event yang akan dihapus."
          schema:
            type: integer
            minimum: 1
          examples:
            valid:
              value: 42
      responses:
        "204":
          description: "Event berhasil dihapus. Tidak ada body respons."
        "401":
          description: "Token tidak ada, tidak valid, atau sudah kedaluwarsa."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "UNAUTHORIZED"
                  message: "Could not validate credentials."
                  httpStatus: 401
        "403":
          description: "Token valid tapi bukan role admin."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "FORBIDDEN"
                  message: "You do not have permission to perform this action."
                  httpStatus: 403
        "404":
          description: "Event dengan ID tersebut tidak ditemukan."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  code: "EVENT_NOT_FOUND"
                  message: "Event not found."
